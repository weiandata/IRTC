name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Markdown style
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Verify links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --accept-timeouts
            --exclude-path docs/development
            --exclude-path docs/manuals
            --exclude-path docs/internal/cran-submission-guide-zh.md
            --exclude-path scripts/sp5_threading_notes.md
            './**/*.md'
          fail: true
